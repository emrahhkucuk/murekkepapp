<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mürekkep</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F9F9F9;
      color: #1A1A1A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border: 1px solid #E6E4E0;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }
    .logo {
      font-family: 'Newsreader', serif;
      font-style: italic;
      font-size: 28px;
      font-weight: 600;
      color: #1A1A1A;
      margin-bottom: 8px;
    }
    .icon { font-size: 20px; margin-right: 4px; }
    .desc {
      font-size: 15px;
      color: #5C5C5C;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1A1A1A;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 15px;
      padding: 14px 28px;
      border-radius: 9999px;
      text-decoration: none;
      transition: background .2s, transform .15s;
    }
    .btn:hover { background: #333; }
    .btn:active { transform: scale(.98); }
    .back {
      margin-top: 20px;
      font-size: 13px;
      color: #9A9A90;
    }
    .back a { color: #5C5C5C; text-decoration: none; }
    .back a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span class="icon">✒️</span>Mürekkep</div>
    <p class="desc">Bu içeriği görmek için Mürekkep uygulamasını indirin.</p>
    <a class="btn" href="https://apps.apple.com/tr/app/m%C3%BCrekkep-blog-ders-notlar%C4%B1/id6760975752?l=tr">
      App Store'dan İndir
    </a>
    <p class="back"><a href="/">Ana sayfaya dön</a></p>
  </div>
</body>
</html>
